*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;display:flex;min-height:100vh;font-size:14px}
#sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid #e5e7eb;padding:20px 16px;display:flex;flex-direction:column;gap:18px}
#main{flex:1;padding:22px 24px;overflow:auto}

.lbl{font-size:11px;font-weight:700;color:#374151;margin-bottom:6px}
.kpi{margin-top:auto;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:16px;text-align:center}
.kpi-n{font-size:11px;color:#6b7280;margin-bottom:4px}
.kpi-v{font-size:40px;font-weight:900;line-height:1}
.kpi-b{display:inline-block;margin-top:8px;padding:2px 12px;border-radius:20px;font-size:11px;font-weight:700}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.card{flex:1 1 150px;padding:12px 16px;border-radius:10px;border:1.5px solid}
.card .cn{font-size:10px;font-weight:700;margin-bottom:3px}
.card .cv{font-size:14px;font-weight:800}
.card .cs{font-size:10px;color:#6b7280;margin-top:2px}
.cbox{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px}
.ctitle{font-size:13px;font-weight:700;color:#374151;margin-bottom:14px}
.bar-row{display:flex;align-items:center;margin-bottom:6px;cursor:pointer}
.bar-row:hover .bar-name{color:#2563eb}
.bar-name{width:160px;min-width:160px;font-size:11px;color:#374151;text-align:right;padding-right:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;position:relative;height:34px;display:flex;flex-direction:column;justify-content:space-between;padding:2px 0}
.bar{height:13px;border-radius:2px;min-width:2px;transition:opacity .15s}
.bar:hover{opacity:.8}
.bar-lbl{font-size:9px;color:#9ca3af;margin-left:4px;white-space:nowrap}
.axis-line{border-top:1px solid #e5e7eb;margin:4px 0}
.xticks{display:flex;justify-content:space-between;font-size:9px;color:#9ca3af;margin-top:4px}
.legend{display:flex;gap:14px;margin-top:12px;font-size:11px;color:#6b7280;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:4px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px}
.back-btn{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;font-family:inherit}
.title-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
</style>

courses.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c==='총합계'?'★ 총합계':c;cSel.appendChild(o);});

function onCourse(){sC=cSel.value;sH='전체';buildH();render();}
function onHospital(){sH=document.getElementById('hSel').value;render();}
function goBack(){sC='총합계';sH='전체';cSel.value='총합계';buildH();render();}

function buildH(){
  const hSel=document.getElementById('hSel');
  hSel.innerHTML='';hSel.disabled=sC==='총합계';
  const hs=sC==='총합계'?['전체']:['전체',...DATA.filter(d=>d.p===sC).map(d=>d.h)];
  hs.forEach(h=>{const o=document.createElement('option');o.value=h;o.textContent=h;if(h===sH)o.selected=true;hSel.appendChild(o);});
}

function chartData(){
  if(sC==='총합계'){
    const m={};
    DATA.forEach(d=>{if(!m[d.p])m[d.p]={name:d.p,s:0,r:0};m[d.p].s+=d.s;m[d.p].r+=d.r;});
    return Object.values(m).sort((a,b)=>b.s-a.s);
  }
  const f=DATA.filter(d=>d.p===sC);
  if(sH!=='전체'){const it=f.find(d=>d.h===sH);return it?[{name:it.h,s:it.s,r:it.r}]:[];}
  return f.sort((a,b)=>b.s-a.s).map(d=>({name:d.h,s:d.s,r:d.r}));
}

function drawChart(data){
  const el=document.getElementById('chart');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#9ca3af">데이터 없음</div>';return;}
  const maxS=Math.max(...data.map(d=>Math.abs(d.s)),...data.map(d=>Math.abs(d.r)),1);
  const W=el.offsetWidth||600;
  const trackW=W-180;

  let html='';
  data.forEach((d,i)=>{
    const wS=Math.round(Math.abs(d.s)/maxS*trackW);
    const wR=Math.round(Math.abs(d.r)/maxS*trackW);
    const cS=d.s<0?'#fca5a5':'#3b82f6';
    const cR=d.r<0?'#fb923c':'#8b5cf6';
    const name=d.name.length>18?d.name.slice(0,18)+'…':d.name;
    const click=sC==='총합계'?`onclick="drill('${d.name.replace(/'/g,"\\'")}')" style="cursor:pointer"`:'';
    html+=`<div class="bar-row" ${click}>
      <div class="bar-name">${name}</div>
      <div class="bar-track">
        <div style="display:flex;align-items:center">
          <div class="bar" style="width:${wS}px;background:${cS}"></div>
          <span class="bar-lbl">${fmt(d.s)}</span>
        </div>
        <div style="display:flex;align-items:center">
          <div class="bar" style="width:${wR}px;background:${cR}"></div>
          <span class="bar-lbl">${fmt(d.r)}</span>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function drill(name){sC=name;sH='전체';cSel.value=name;buildH();render();}

function render(){
  // breadcrumb
  let bc=`처방코스: <b style="color:#2563eb">${sC}</b>`;
  if(sH!=='전체'&&sC!=='총합계')bc+=` › <b style="color:#7c3aed">${sH}</b>`;
  document.getElementById('bc').innerHTML=bc;
  document.getElementById('bb').style.display=sC==='총합계'?'none':'inline-block';

  // kpi
  let kv,kn;
  if(sC==='총합계'){kv=TOTAL.i;kn='전체 합계';}
  else if(sH!=='전체'){const it=DATA.find(d=>d.p===sC&&d.h===sH);kv=it?it.i:0;kn=sH.length>13?sH.slice(0,13)+'…':sH;}
  else{const f=DATA.filter(d=>d.p===sC);const v=f.filter(d=>isFinite(d.i)&&Math.abs(d.i)<5);kv=v.length?v.reduce((a,d)=>a+d.i,0)/v.length:0;kn=sC+' 평균';}
  const kc=kv>=0.3?'#16a34a':kv>=0?'#d97706':'#dc2626';
  document.getElementById('kn').textContent=kn;
  document.getElementById('kv').textContent=fmtP(kv||0);
  document.getElementById('kv').style.color=kc;
  document.getElementById('kb').textContent=kv>=0?'▲ 흑자':'▼ 적자';
  document.getElementById('kb').style.color=kc;
  document.getElementById('kb').style.background=kc+'22';
  document.getElementById('ks').textContent=sH==='전체'&&sC!=='총합계'?'이상치 제외 평균':'';

  // cards
  const f=sC==='총합계'?null:DATA.filter(d=>d.p===sC);
  const ct=sC==='총합계'?{s:TOTAL.s,r:TOTAL.r}:{s:f.reduce((a,d)=>a+d.s,0),r:f.reduce((a,d)=>a+d.r,0)};
  const si=sH!=='전체'&&sC!=='총합계'?DATA.find(d=>d.p===sC&&d.h===sH):null;
  const cd=chartData();
  let ch=`<div class="card" style="background:#eff6ff;border-color:#bfdbfe"><div class="cn" style="color:#3b82f6">전체 총 매출</div><div class="cv" style="color:#1d4ed8">${fmt(TOTAL.s)}원</div><div class="cs">실매출: <b style="color:#1d4ed8">${fmt(TOTAL.r)}원</b></div></div>`;
  if(sC!=='총합계')ch+=`<div class="card" style="background:#f0fdf4;border-color:#bbf7d0"><div class="cn" style="color:#16a34a">${sC} 합계</div><div class="cv" style="color:#15803d">${fmt(ct.s)}원</div><div class="cs">실매출: <b style="color:#15803d">${fmt(ct.r)}원</b></div></div>`;
  if(si)ch+=`<div class="card" style="background:#faf5ff;border-color:#e9d5ff"><div class="cn" style="color:#7c3aed">선택 간납처</div><div class="cv" style="color:#6d28d9">${fmt(si.s)}원</div><div class="cs">실매출: <b style="color:#6d28d9">${fmt(si.r)}원</b></div></div>`;
  ch+=`<div class="card" style="flex:0 0 110px;background:#fff7ed;border-color:#fed7aa"><div class="cn" style="color:#ea580c">${sC==='총합계'?'처방코스 수':'간납처 수'}</div><div style="font-size:28px;font-weight:900;color:#c2410c">${cd.length}</div><div style="font-size:10px;color:#9ca3af">개</div></div>`;
  document.getElementById('cards').innerHTML=ch;

  // chart title
  const ctt=sC==='총합계'?'처방코스별 매출 비교 (전체) — 막대 클릭 시 해당 처방코스로 이동':sH!=='전체'?sH+' — 매출 상세':sC+' — 간납처별 매출';
  document.getElementById('ct').textContent=ctt;

  drawChart(cd);
}

buildH();
render();
</script>
</body>
</html>
